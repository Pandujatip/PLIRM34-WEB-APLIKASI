name: Deploy PLIRM34

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy frontend files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          target: ${{ secrets.VPS_APP_DIR }}
          overwrite: true
          source: >-
            index.html,
            styles.css,
            app.js,
            app.auth.js,
            app.dashboard.js,
            app.service.js,
            app.mso.js,
            app.carbon-brush.js,
            app.admin.js,
            service-worker.js,
            manifest.webmanifest,
            pwa-icons/**,
            slideshow-images/**
